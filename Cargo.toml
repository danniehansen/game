[package]
name = "game"
version = "0.1.0"
edition = "2024"
rust-version = "1.94"
default-run = "game"

[features]
default = []
steam = ["dep:steamworks"]

[dependencies]
anyhow = "1.0.102"
bevy = "0.18.1"
bevy_egui = "0.39.1"
clap = { version = "4.6.1", features = ["derive"] }
directories = "6.0.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
steamworks = { version = "0.13.1", optional = true }
thiserror = "2.0.18"
uuid = { version = "1.23.1", features = ["serde", "v4"] }
