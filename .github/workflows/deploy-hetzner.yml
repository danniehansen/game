name: Deploy Hetzner Dedicated Server

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-hetzner-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"
  GAME_SERVICE_USER: game-server
  GAME_SERVICE_NAME: game-server
  GAME_BIND_ADDR: 0.0.0.0:7777
  GAME_AUTH_MODE: offline
  GAME_RESTART_NOTICE_SECONDS: "15"

jobs:
  deploy:
    name: Build ARM and deploy
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate SSH secrets
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          test -n "${HETZNER_HOST}" || { echo "HETZNER_HOST secret is required" >&2; exit 1; }
          test -n "${HETZNER_SSH_KEY}" || { echo "HETZNER_SSH_KEY secret is required" >&2; exit 1; }

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ pkg-config libx11-dev libasound2-dev libudev-dev libxkbcommon-x11-0 libwayland-dev libxkbcommon-dev

      - name: Install Rust toolchain
        run: rustup toolchain install --profile minimal --target aarch64-unknown-linux-gnu

      - name: Cache Cargo data
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: deploy-hetzner-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            deploy-hetzner-${{ runner.os }}-${{ runner.arch }}-

      - name: Build dedicated server binary
        run: cargo build --locked --release --target aarch64-unknown-linux-gnu

      - name: Package binary
        run: tar -C target/aarch64-unknown-linux-gnu/release -czf game-server-aarch64.tar.gz game

      - name: Prepare deploy version
        id: version
        run: |
          ref="${GITHUB_REF_NAME//\//-}"
          echo "value=${ref}-${GITHUB_SHA::7}" >> "${GITHUB_OUTPUT}"

      - name: Configure SSH
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HETZNER_KNOWN_HOSTS: ${{ secrets.HETZNER_KNOWN_HOSTS }}
        run: |
          port="${HETZNER_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${HETZNER_SSH_KEY}" > ~/.ssh/hetzner
          chmod 600 ~/.ssh/hetzner

          if [ -n "${HETZNER_KNOWN_HOSTS}" ]; then
            printf '%s\n' "${HETZNER_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${port}" "${HETZNER_HOST}" > ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Upload and deploy
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          DEPLOY_VERSION: ${{ steps.version.outputs.value }}
        run: |
          port="${HETZNER_PORT:-22}"
          user="${HETZNER_USER:-root}"
          target="${user}@${HETZNER_HOST}"
          remote_archive="/tmp/game-server-${GITHUB_SHA}.tar.gz"
          remote_script="/tmp/deploy-game-server-${GITHUB_SHA}.sh"
          ssh_opts=(-i ~/.ssh/hetzner -p "${port}" -o IdentitiesOnly=yes)
          scp_opts=(-i ~/.ssh/hetzner -P "${port}" -o IdentitiesOnly=yes)

          scp "${scp_opts[@]}" game-server-aarch64.tar.gz "${target}:${remote_archive}"
          scp "${scp_opts[@]}" .github/scripts/deploy-hetzner-server.sh "${target}:${remote_script}"
          ssh "${ssh_opts[@]}" "${target}" \
            "chmod +x '${remote_script}' && '${remote_script}' '${remote_archive}' '${DEPLOY_VERSION}' '${GAME_SERVICE_USER}' '${GAME_SERVICE_NAME}' '${GAME_BIND_ADDR}' '${GAME_AUTH_MODE}' '${GAME_RESTART_NOTICE_SECONDS}'"
